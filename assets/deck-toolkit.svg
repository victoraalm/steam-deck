<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Steam Deck Toolkit">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2838"/>
      <stop offset="1" stop-color="#2a475e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#66c0f4"/>
      <stop offset="1" stop-color="#1a9fff"/>
    </linearGradient>
  </defs>

  <!-- fundo arredondado -->
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bg)"/>

  <!-- corpo do handheld -->
  <g>
    <!-- grips laterais -->
    <rect x="28" y="78" width="60" height="100" rx="30" fill="#0e1620"/>
    <rect x="168" y="78" width="60" height="100" rx="30" fill="#0e1620"/>
    <!-- barra central / tela -->
    <rect x="72" y="84" width="112" height="88" rx="14" fill="#0e1620"/>
    <rect x="84" y="96" width="88" height="64" rx="8" fill="url(#screen)"/>
  </g>

  <!-- analógicos -->
  <circle cx="56" cy="150" r="11" fill="#2a475e"/>
  <circle cx="200" cy="150" r="11" fill="#2a475e"/>

  <!-- d-pad esquerdo -->
  <g fill="#2a475e">
    <rect x="49" y="106" width="14" height="30" rx="3"/>
    <rect x="41" y="114" width="30" height="14" rx="3"/>
  </g>
  <!-- botões direito -->
  <g fill="#66c0f4">
    <circle cx="196" cy="112" r="6"/>
    <circle cx="212" cy="124" r="6"/>
    <circle cx="180" cy="124" r="6"/>
    <circle cx="196" cy="136" r="6"/>
  </g>

  <!-- chave de boca (toolkit) sobreposta na tela -->
  <g transform="rotate(40 128 128)">
    <path fill="#ffffff" d="M150 96c-9-9-23-10-33-3l14 14-8 8-14-14c-7 10-6 24 3 33 8 8 20 9 30 4l24 24c3 3 8 3 11 0l3-3c3-3 3-8 0-11l-24-24c5-10 4-22-4-30z"/>
  </g>
</svg>
