name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint dos scripts
        run: |
          shellcheck -x \
            lib/common.sh \
            setup/distrobox-podman setup/arch-devenv setup/deck-region \
            recovery/podman recovery/waydroid \
            deck-toolkit install.sh scripts/build.sh

      - name: Testar o build (gera dist/)
        run: bash scripts/build.sh
